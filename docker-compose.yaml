name: chatgpt-telegram-workers
services:
    chatgpt-telegram-workers:
        build: .
        ports: ['8787:8787']
        # change `./config.json` and `./wrangler.toml` to your local path
        volumes: ['./config.json:/app/config.json:ro', './wrangler.toml:/app/wrangler.toml:ro']
        network_mode: host # If you access the proxy port based on the host
